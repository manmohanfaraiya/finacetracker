<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>login</title>

        <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
        }

        input{
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button{
            width: 100%;
            padding: 10px;
            background: #4facfe;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover{
            background: #3a8ee6;
        }

        .register-link{
            text-align: center;
            margin-top: 10px;
        }

        .register-link a{
            color: #4facfe;
            text-decoration: none;
        }
    </style>
    </head>

    <body>

        <div class="container">
            <h2>login</h2>

            <form action="/login" method="post" id="loginForm">
                
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password"
                    required>
               
                <button type="submit">login</button>
            </form>

            <div class="register-link">
                <p>dont have an account? <a href="/register">register</a></p>
            </div>
        </div>

    </body>
</html>
